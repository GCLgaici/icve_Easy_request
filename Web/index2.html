<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫一扫</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }

        /* 顶部蓝色导航栏 */
        .top-bar {
            height: 60px;
            background-color: #0058cc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 16px;
            color: #fff;
            font-size: 28px;
            text-decoration: none;
        }
        .top-title {
            color: #ffffff;
            font-size: 22px;
        }

        /* 扫码主体区域 移除红色背景 */
        .scan-container {
            flex: 1;
            position: relative;
            height: calc(100% - 60px);
            background: #000;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 去掉半透明opacity */
        }

        /* 横向扫描滚动线 */
        .scan-line {
            position: absolute;
            left: 8%;
            right: 8%;
            height: 2px;
            background: #80e0ff;
            box-shadow: 0 0 8px #80e0ff;
            animation: scanMove 3s infinite linear;
        }
        @keyframes scanMove {
            0% { top: 25%; }
            50% { top: 70%; }
            100% { top: 25%; }
        }

        /* 底部按钮区域 */
        .bottom-buttons {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
        }
        .btn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }
        .btn-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .btn-text {
            font-size: 16px;
        }

        /* 识别结果弹窗 */
        #result-box {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            display: none;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <a href="javascript:history.back()" class="back-btn">&lt;</a>
        <div class="top-title">扫一扫</div>
    </div>

    <!-- 扫码取景 -->
    <div class="scan-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-line"></div>

        <!-- 底部两个按钮 -->
        <div class="bottom-buttons">
            <div class="btn-item" id="lightBtn">
                <div class="btn-icon">⚡</div>
                <div class="btn-text">打开闪光灯</div>
            </div>
            <div class="btn-item" id="albumBtn">
                <div class="btn-icon">🖼</div>
                <div class="btn-text">相册</div>
            </div>
        </div>

        <div id="result-box"></div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none;">

    <script>
        const video = document.getElementById('video');
        const resultBox = document.getElementById('result-box');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let scanLocked = false;
        let mediaStream = null;
        let torchEnabled = false;

        // 启动摄像头
        async function initCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
                });
                video.srcObject = mediaStream;
                video.addEventListener('loadedmetadata', startScanLoop);
            } catch (err) {
                resultBox.style.display = 'block';
                resultBox.innerText = '摄像头权限拒绝：' + err.message;
            }
        }

        // 循环解析二维码 优化识别逻辑
        function startScanLoop() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            scanFrame();
        }
        function scanFrame() {
            requestAnimationFrame(scanFrame);
            if (scanLocked) return;

            ctx.drawImage(video, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            // 增加第二个参数容错阈值，大幅提升识别成功率
            const code = jsQR(imgData.data, canvas.width, canvas.height, {
                inversionAttempts: "attemptBoth"
            });

            if (code) {
                scanLocked = true;
                resultBox.style.display = 'block';
                resultBox.innerText = '扫码结果：\n' + code.data;
            }
        }

        // 闪光灯切换（移动端部分浏览器支持）
        document.getElementById('lightBtn').addEventListener('click', async () => {
            if (!mediaStream) return;
            const track = mediaStream.getVideoTracks()[0];
            try {
                const capabilities = track.getCapabilities();
                if (!capabilities.torch) {
                    alert('当前设备不支持闪光灯');
                    return;
                }
                torchEnabled = !torchEnabled;
                await track.applyConstraints({advanced: [{torch: torchEnabled}]});
                document.querySelector('#lightBtn .btn-text')
                    = torchEnabled ? '关闭闪光灯' : '打开闪光灯';
            } catch (e) {
                alert('闪光灯无法开启');
            }
        });

        // 相册选择图片识别
        document.getElementById('albumBtn').addEventListener('click', ()=>{
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', e=>{
            const file = e.target.files[0];
            if(!file) return;
            const img = new Image();
            img.onload = ()=>{
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img,0,0);
                const imgData = ctx.getImageData(0,0,img.width,img.height);
                const code = jsQR(imgData.data, img.width, img.height, {inversionAttempts: "attemptBoth"});
                if(code){
                    resultBox.style.display='block';
                    resultBox.innerText='相册识别结果：\n'+code.data;
                }else{
                    alert('图片内未识别到二维码');
                }
            };
            img.src = URL.createObjectURL(file);
        });

        // 页面加载初始化
        initCamera();
    </script>
</body>
</html>
