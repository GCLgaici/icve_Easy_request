<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职教云-易登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-item {
            margin-bottom: 22px;
        }
        .form-item label {
            display: block;
            font-size: 15px;
            color: #555;
            margin-bottom: 8px;
        }
        .input-box, .select-box {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-box:focus, .select-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        /* 只读token输入框样式 */
        .token-input {
            background-color: #f5f5f5;
            color: #888;
            cursor: not-allowed;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .submit-btn {
            background: #667eea;
            color: white;
        }
        .reset-btn {
            background: #eee;
            color: #333;
        }
        .tip {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #999;
        }
        .msg {
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #e8f4ff;
            color: #2b6cb0;
        }
    </style>
    <!-- 第一步：先加载axios，必须写在调用axios代码前面 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="card">
        <h2 class="title">ICVE-易签到 易登录</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="msg">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}


        <!-- 学号 -->
        <div class="form-item">
            <label for="studentId">学号</label>
            <input type="text" id="studentId" name="studentId" class="input-box"
                   placeholder="学号" required tabindex="-1">
        </div>
        <div class="btn-group">
            <button type="submit" class="submit-btn" id="submitBtn">登录</button>
            <button type="reset" class="reset-btn" id="reset-btn">清空重填</button>
        </div>

        <p class="tip">填写完成后点击提交即可</p>
    </div>



    <!-- 第二步：再执行你的请求代码 -->
    <script>
        // 设置cookie，days有效期天数
        function setCookie(name,value,days){
            let date = new Date()
            date.setTime(date.getTime() + days*24*60*60*1000)
            document.cookie = `${name}=${value};expires=${date.toUTCString()};path=/`
        }
        // 获取cookie
        function getCookie(name){
            let arr = document.cookie.split('; ')
            for(let item of arr){
                let kv = item.split('=')
                if(kv[0] === name) return kv[1]
            }
            return ""
        }


        // 获取按钮元素
        const btn = document.getElementById('submitBtn')
        // 绑定点击事件
        btn.addEventListener('click',async function(){
            this.disabled = true
            this.innerText = '进入中...'
            try {
                let student_id = document.getElementById('studentId').value
                let res = await axios.post("/api/login",{
                    studentId: 'fjlzy'+student_id
                })
                console.log('返回数据',res.data)
                console.log('返回数据',res.data.authorization)
                setCookie("authorization",res.data.authorization,3)
                location.href = `/home2`;


            }finally {
                 // 无论成功失败，都解除锁定
                this.disabled = false
                this.innerText = '登录'
            }

        })

        // 获取按钮元素
        const qk_btn = document.getElementById('reset-btn')
        // 绑定点击事件
        qk_btn.addEventListener('click',async function(){

            document.getElementById('studentId').value = "";
            console.log('qk')
        })
    </script>
</body>
</html>
