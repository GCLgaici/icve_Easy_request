<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级信息登记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-item {
            margin-bottom: 22px;
        }
        .form-item label {
            display: block;
            font-size: 15px;
            color: #555;
            margin-bottom: 8px;
        }
        .input-box, .select-box {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-box:focus, .select-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        /* 只读token输入框样式 */
        .token-input {
            background-color: #f5f5f5;
            color: #888;
            cursor: not-allowed;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .submit-btn {
            background: #667eea;
            color: white;
        }
        .reset-btn {
            background: #eee;
            color: #333;
        }
        .tip {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #999;
        }
        .msg {
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #e8f4ff;
            color: #2b6cb0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="title">易签到</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="msg">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form id="infoForm" action="/home" method="post">
            <!-- 后端传入Token，只读不可编辑 -->
            <div class="form-item">
                <label>访问凭证Token（系统生成）</label>
                <input
                    type="text"
                    name="token"
                    class="input-box token-input"
                    value="{{ token }}"
                    readonly
                    tabindex="-1"
                >
            </div>

            <!-- 后端传入手机号，只读不可编辑 -->
            <div class="form-item">
                <label>密钥</label>
                <input
                    type="password"
                    name="mobile"
                    class="input-box"
                    value="{{ mobile }}"
                    readonly
                    tabindex="-1"
                    placeholder="密钥"
                >
            </div>

            <!-- 学校 -->
            <div class="form-item">
                <label for="school_name">学校</label>
                <input type="text" id="school_name" name="school_name" class="input-box"
                       placeholder="学校名称" value="{{ school_name }}" readonly tabindex="-1">
            </div>

            <!-- 学号 -->
            <div class="form-item">
                <label for="studentId">学号</label>
                <input type="text" id="studentId" name="studentId" class="input-box"
                       placeholder="学号" value="{{ student_id }}" readonly tabindex="-1">
            </div>

            <!-- 姓名输入 -->
            <div class="form-item">
                <label for="username">输入你的姓名</label>
                <input type="text" id="username" name="username" class="input-box"
                       placeholder="请填写姓名" value="{{ name }}" required>
            </div>


            <div class="btn-group">
                <button type="submit" class="submit-btn">提交进入</button>
<!--                <button type="reset" class="reset-btn">清空重填</button>-->
            </div>
        </form>
        <p class="tip">点击提交进入即可 <br>--使用此Web，则默认视为您 已经接受 了此免责声明。请仔细阅读</p>
    </div>
</body>
</html>
